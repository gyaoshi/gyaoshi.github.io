<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gyaoshi - Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            color: #e6edf3;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #8b949e;
            font-size: 1rem;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.8rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            border-color: #58a6ff;
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(88, 166, 255, 0.15);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
        }

        .tag {
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: #484f58;
            font-size: 0.85rem;
        }

        footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>gyaoshi</h1>
        <p>Indie Android Developer</p>
    </header>

    <div class="projects">
        <a class="card" href="charging-monitor/">
            <div class="card-icon">&#x1F50B;</div>
            <div class="card-title">Charging Monitor</div>
            <div class="card-desc">&#x5B9E;&#x65F6;&#x76D1;&#x6D4B;&#x5145;&#x7535;&#x529F;&#x7387;&#x3001;&#x7535;&#x538B;&#x3001;&#x7535;&#x6D41;&#xFF0C;&#x68C0;&#x6D4B;&#x5FEB;&#x5145;&#x534F;&#x8BAE;&#xFF0C;&#x67E5;&#x770B;&#x7535;&#x6C60;&#x5065;&#x5EB7;&#x72B6;&#x6001;</div>
            <div class="card-tags">
                <span class="tag">Android</span>
                <span class="tag">Kotlin</span>
                <span class="tag">Compose</span>
            </div>
        </a>

        <!-- &#x672A;&#x6765;&#x65B0;&#x9879;&#x76EE;&#x53EF;&#x4EE5;&#x5728;&#x8FD9;&#里添加，复制上面的 card &#x7ED3;&#x6784;&#x5373;&#x53EF -->
    </div>

    <footer>
        &copy; 2026 gyaoshi &middot;
        <a href="https://github.com/gyaoshi">GitHub</a>
    </footer>
</body>
</html>
